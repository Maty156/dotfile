#  ┃┃┃┃┃┃┃ ┃ ┗┓
#  ┻┛┗┣┛┗┛ ┻ ┗┛

input {
  kb_layout = us
  repeat_rate = 50
  repeat_delay = 300
  sensitivity = 0
  numlock_by_default = true
  follow_mouse = true

  touchpad {
    disable_while_typing = true
    natural_scroll = false
    clickfinger_behavior = false
    middle_button_emulation = true
    tap-to-click = true
    drag_lock = false
    # swipe gestures (moved here in 0.46+)
  }

  touchdevice {
    enabled = true
  }

  tablet {
    transform = 0
    left_handed = 0
  }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
