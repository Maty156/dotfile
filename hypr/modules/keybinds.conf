$deskScripts = $HOME/.config/hypr/scripts
$rofiScripts  = $HOME/.config/rofi/scripts
$mainMod      = SUPER

#-----------apps-----------#
bind = $mainMod, Q,           exec, kitty
bind = $mainMod, E,           exec, thunar
bind = $mainMod, space,       exec, $rofiScripts/launcher
bind = $mainMod ALT, space,   exec, $rofiScripts/launcher-style-changer
bind = $mainMod, A,           exec, swaync-client --open-panel 

#-----------window-----------#
bind = $mainMod, C,           killactive
bind = $mainMod, F,           fullscreen
bind = $mainMod, V,           exec, hyprctl --batch "dispatch togglefloating; dispatch centerwindow; dispatch resizeactive exact 900 600"


#------Resize windows-------#
bind = $mainMod ALT, left,  resizeactive, -40 0
bind = $mainMod ALT, right, resizeactive, 40 0
bind = $mainMod ALT, up,    resizeactive, 0 -40
bind = $mainMod ALT, down,  resizeactive, 0 40

#-----------focus-----------#
bind = $mainMod, left,        movefocus, l
bind = $mainMod, right,       movefocus, r
bind = $mainMod, up,          movefocus, u
bind = $mainMod, down,        movefocus, d
bind = $mainMod, Tab,              cyclenext

#-----------workspaces-----------#
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1,     movetoworkspace, 1
bind = $mainMod SHIFT, 2,     movetoworkspace, 2
bind = $mainMod SHIFT, 3,     movetoworkspace, 3
bind = $mainMod SHIFT, 4,     movetoworkspace, 4
bind = $mainMod SHIFT, 5,     movetoworkspace, 5
bind = $mainMod SHIFT, 6,     movetoworkspace, 6
bind = $mainMod SHIFT, 7,     movetoworkspace, 7
bind = $mainMod SHIFT, 8,     movetoworkspace, 8
bind = $mainMod SHIFT, 9,     movetoworkspace, 9
bind = $mainMod SHIFT, 0,     movetoworkspace, 10

bind = $mainMod, S,           togglespecialworkspace, magic
bind = $mainMod SHIFT, S,     movetoworkspace, special:magic

#-----------mouse-----------#
bindm = $mainMod, mouse:272,  movewindow
bindm = $mainMod, mouse:273,  resizewindow

#-----------volume (no script, direct wpctl)-----------#
binde =, XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
binde =, XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind =, XF86AudioMute, exec, swayosd-client --output-volume mute-toggle

#-----------brightness (no script, direct brightnessctl)-----------#
bindl = , XF86MonBrightnessUp, exec, swayosd-client --brightness +5
bindl = , XF86MonBrightnessDown, exec, swayosd-client --brightness -1

#-----------media-----------#
bindl = , XF86AudioNext,          exec, playerctl next
bindl = , XF86AudioPause,         exec, playerctl play-pause
bindl = , XF86AudioPlay,          exec, playerctl play-pause
bindl = , XF86AudioPrev,          exec, playerctl previous

#-----------waybar & wallpaper-----------#
bind = $mainMod ALT, B,       exec, pkill -SIGUSR1 waybar
bind = $mainMod, B,      exec, $deskScripts/waybarSelect.sh
bind = $mainMod, W,       exec, $deskScripts/wallSelect.sh
bind = $mainMod, R,       exec, $deskScripts/refresh.sh

#-----------rofi extras-----------#
bind = $mainMod CTRL, V,      exec, $rofiScripts/cliphist.sh
bind = $mainMod, SEMICOLON,   exec, $rofiScripts/rofiEmoji.sh
bind = $mainMod, I,           exec, $rofiScripts/websearch.sh

#-----------screenshot-----------#
bind = $mainMod,              Print, exec, grim ~/Pictures/screenshots/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = ,                      Print, exec, grim -g "$(slurp)" ~/Pictures/screenshots/screenshot-$(date +%Y%m%d-%H%M%S).png

#-----------exit-----------#
bind = $mainMod, L,      exec, hyprlock 
bind = $mainMod, M, exec, $deskScripts/wlogout.sh

#-----------zoom-----------#
bind = $mainMod, mouse_down,  exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 + 0.5}')
bind = $mainMod, mouse_up,    exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 - 0.5}')
bind = $mainMod SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor 1
