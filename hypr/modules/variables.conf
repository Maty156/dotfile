#----------------cursors------------------#
#-----------------------------------------#
env = HYPRCURSOR_THEME,Bibata-Modern-Ice           # hyprcursor theme
env = HYPRCURSOR_SIZE,24                           # hyprcursor size
env = XCURSOR_THEME,Bibata-Modern-Ice              # xcursor theme
env = XCURSOR_SIZE,24                              # xcursor size

#---------------toolkit backend variables-------------------#
#-----------------------------------------------------------#
env = CLUTTER_BACKEND,wayland
env = GDK_BACKEND,wayland,x11,*
env = GDK_SCALE,1                                  # xwayland apps scale fix (useful if you are use monitor scaling)

#-------------------xdg specifications-----------------------#
#------------------------------------------------------------#
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

#-----------------------qt variables-------------------------#
#------------------------------------------------------------#
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QUICK_CONTROLS_STYLE,org.hyprland.style   # hyprland-qt-support

#----------------------firefox------------------------#
#-----------------------------------------------------#
env = MOZ_ENABLE_WAYLAND,1                         # firefox

#----------------------gtk theme----------------------#
#-----------------------------------------------------#
# Deliberately NOT setting GTK_THEME here — it overrides gsettings
# entirely for GTK3 apps, which defeats matugen's adw-gtk3/adw-gtk3-dark
# + color-scheme pipeline. Theme is managed dynamically via gsettings now.
