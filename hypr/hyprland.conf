source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/hyprland-colors.conf

# Hyprland Config — MASU Setup
# https://wiki.hypr.land/Configuring/

################
### MONITORS ###
################

monitor = LVDS-1, 1366x768@60, 0x0, 1

###################
### MY PROGRAMS ###
###################

$terminal    = kitty
$fileManager = thunar
$menu        = rofi -show drun

#################
### AUTOSTART ###
#################

exec-once = uwsm app -- matuwall --daemon
exec-once = swaync
exec-once = nm-applet
exec-once = awww-daemon
exec-once = bash -c "sleep 1 && wal -R -q && bash ~/.config/hypr/scripts/wal-watcher.sh"

# wob OSD pipe
exec-once = bash -c "rm -f /tmp/wobpipe && mkfifo /tmp/wobpipe && tail -f /tmp/wobpipe | wob -c ~/.config/wob/wob.ini"

# Waybar — delayed to avoid flash on startup
exec-once = bash -c "sleep 3 && waybar"

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in        = 4
    gaps_out       = 10
    border_size    = 1
    resize_on_border = true
    allow_tearing  = false
    layout         = dwindle
}

decoration {
    rounding = 14

    active_opacity   = 1
    inactive_opacity = 0.90

    shadow {
        enabled      = true
        range        = 16
        render_power = 3
        color        = rgba(00000044)
    }

    blur {
        enabled = true
        size    = 3
        passes  = 4
    }
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

gestures {
    workspace_swipe         = true
    workspace_swipe_fingers = 3
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
}

#############
### INPUT ###
#############

input {
    kb_layout  = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Apps
bind = $mainMod,       Q,     exec, $terminal
bind = $mainMod,       E,     exec, $fileManager
bind = $mainMod,       SPACE, exec, $menu

# Window management
bind = $mainMod,       C,     killactive
bind = $mainMod,       V,     togglefloating
bind = $mainMod SHIFT, V,     exec, hyprctl --batch "dispatch togglefloating; dispatch centerwindow; dispatch resizeactive exact 900 600"
bind = $mainMod,       P,     pseudo
bind = $mainMod,       J,     layoutmsg, togglesplit
bind = $mainMod,       F,     fullscreen

# Session
bind = $mainMod,       L,     exec, hyprlock
bind = $mainMod,       Delete,exec, hyprlock & sleep 0.5 && systemctl suspend
bind = $mainMod,       M,     exec, hyprctl dispatch exit

# Screenshot
bind = ,               Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = $mainMod,       Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# Focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Move windows
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Resize windows
bind = $mainMod ALT, left,  resizeactive, -40 0
bind = $mainMod ALT, right, resizeactive, 40 0
bind = $mainMod ALT, up,    resizeactive, 0 -40
bind = $mainMod ALT, down,  resizeactive, 0 40

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Mouse workspace scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Mouse move/resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media & brightness
bindel = , XF86AudioRaiseVolume,  exec, ~/.config/hypr/scripts/volume-up.sh
bindel = , XF86AudioLowerVolume,  exec, ~/.config/hypr/scripts/volume-down.sh
bindel = , XF86AudioMute,         exec, ~/.config/hypr/scripts/volume-mute.sh
bindel = , XF86MonBrightnessUp,   exec, ~/.config/hypr/scripts/brightness-up.sh
bindel = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness-down.sh

# Matuwall
bind = $mainMod, W, exec, matuwall --toggle

# Spotify scratchpad
bind = $mainMod, Z, exec, ~/.config/hypr/scripts/spotify-toggle.sh

# Waybar theme cycle
bind = $mainMod, T, exec, ~/.config/waybar/scripts/switch-theme.sh

# Restart waybar
bind = $mainMod SHIFT, R, exec, pkill waybar; sleep 0.3 && waybar &

# SwayNC notification panel
bind = $mainMod, A, exec, swaync-client -t -sw

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule = suppress_event maximize, match:class .*

# nmtui
windowrule = float on,    match:title nmtui
windowrule = center on,   match:title nmtui
windowrule = size 500 400, match:title nmtui

# pavucontrol
windowrule = float on,    match:class ^(pavucontrol)$
windowrule = size 700 450, match:class ^(pavucontrol)$
windowrule = center on,   match:class ^(pavucontrol)$

# File dialogs
windowrule = float on,  match:title ^(Open|Save|Open File|Save File)$
windowrule = center on, match:title ^(Open|Save|Open File|Save File)$

# Image viewer
windowrule = float on,    match:class ^(org\.gnome\.Loupe)$
windowrule = size 900 620, match:class ^(org\.gnome\.Loupe)$
windowrule = center on,   match:class ^(org\.gnome\.Loupe)$

# Matuwall
windowrule = float on,          match:class com\.kwimy\.Matuwall
windowrule = animation slide top, match:class com\.kwimy\.Matuwall
windowrule = rounding 15,       match:class com\.kwimy\.Matuwall
windowrule = border_size 0,     match:class com\.kwimy\.Matuwall
windowrule = rounding_power 2,  match:class com\.kwimy\.Matuwall
windowrule = no_shadow on,      match:class com\.kwimy\.Matuwall

# Spotify scratchpad
windowrule = workspace special:spotify, match:class ^(Spotify)$

# SwayNC layers
layerrule = blur on,           match:namespace swaync-control-center
layerrule = ignore_alpha 0.5,  match:namespace swaync-control-center
layerrule = blur on,           match:namespace swaync-notification-window
layerrule = ignore_alpha 0.5,  match:namespace swaync-notification-window

# Matuwall layers
layerrule = blur on,           match:namespace matuwall
layerrule = ignore_alpha 0.5,  match:namespace matuwall
layerrule = animation fade,    match:namespace matuwall-backdrop
