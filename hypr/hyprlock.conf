general {
    disable_loading_bar = true
    hide_cursor         = true
    grace               = 0
}

background {
    monitor     =
    path        = $HOME/.cache/wal/wal
    blur_passes = 2
    blur_size   = 3
    brightness  = 0.6
}

# Time — combined HH:MM
label {
    monitor     =
    text        = cmd[update:1000] date +"%H:%M"
    color       = rgba(255, 255, 255, 0.92)
    font_size   = 96
    font_family = JetBrainsMono Nerd Font Bold
    position    = 0, 160
    halign      = center
    valign      = center
    shadow_passes = 2
    shadow_size   = 4
    shadow_color  = rgba(00000099)
}

# Day + date
label {
    monitor     =
    text        = cmd[update:60000] date +"%A, %d %B"
    color       = rgba(255, 255, 255, 0.5)
    font_size   = 16
    font_family = JetBrainsMono Nerd Font
    position    = 0, 60
    halign      = center
    valign      = center
}

# Username greeting
label {
    monitor     =
    text        = cmd[update:0] echo "  $USER"
    color       = rgba(255, 255, 255, 0.55)
    font_size   = 14
    font_family = JetBrainsMono Nerd Font
    position    = 0, 20
    halign      = center
    valign      = center
}

input-field {
    monitor          =
    size             = 260, 52
    outline_thickness = 2
    dots_size        = 0.26
    dots_spacing     = 0.64
    dots_center      = true
    rounding         = 26
    outer_color      = rgba(255, 255, 255, 0.3)
    inner_color      = rgba(0, 0, 0, 0.45)
    font_color       = rgba(255, 255, 255, 0.85)
    fade_on_empty    = true
    placeholder_text = <i>  Password...</i>
    font_family      = JetBrainsMono Nerd Font
    position         = 0, -60
    halign           = center
    valign           = center
    check_color      = rgba(100, 220, 100, 0.85)
    fail_color       = rgba(255, 85, 85, 0.85)
}
