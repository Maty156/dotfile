#  в”Јв”«в”—в”«в”ѓв”ѓв”Јв”«в”ѓ в”ѓв”ѓв”ѓ в”ѓв”« 
#  в”›в”—в”—в”›в”Јв”›в”›в”—в”—в”›в”—в”›в”—в”›в”›в”—в”›
#
# MASU hyprlock вЂ” top-left clock, bottom-center input, matugen-driven

# Sourcing matugen colors
source = $HOME/.config/hypr/hyprlock/matugen/matugen-hyprlock.conf

$text_color              = $on_surface
$muted_text_color        = $outline
$entry_background_color  = $surface_alpha
$entry_border_color      = $tertiary
$entry_color             = $on_surface
$card_color              = $surface_container_alpha
$accent                  = $primary

$font_family        = GeistMono Nerd Font
$font_family_clock  = Syne ExtraBold
$font_symbols       = GeistMono Nerd Font Propo

$image = $HOME/.local/share/bg

# в”Ђв”Ђ Background в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
background {
    monitor =
    path = $image
    blur_size = 6
    blur_passes = 3
    noise = 0.015
    contrast = 0.9
    brightness = 0.75
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# в”Ђв”Ђ Top-left clock cluster в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
label { # Clock
    monitor =
    text = $TIME
    color = $text_color
    font_size = 64
    font_family = $font_family_clock
    position = 60, -70
    halign = left
    valign = top
}

label { # Date
    monitor =
    text = cmd[update:5000] date +"%A, %B %d"
    color = $muted_text_color
    font_size = 16
    font_family = $font_family
    position = 65, -140
    halign = left
    valign = top
}

label { # Greeting
    monitor =
    text = cmd[update:60000] echo "$(h=$(date +%H); if [ $h -lt 12 ]; then echo 'Good morning'; elif [ $h -lt 18 ]; then echo 'Good afternoon'; else echo 'Good evening'; fi), $USER"
    color = $accent
    font_size = 14
    font_family = $font_family
    position = 65, -170
    halign = left
    valign = top
}

# в”Ђв”Ђ Bottom-center glass card behind input в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
shape {
    monitor =
    size = 340, 150
    color = $card_color
    rounding = 24
    border_size = 2
    border_color = $accent
    position = 0, 90
    halign = center
    valign = bottom
}

label { # User (above input, inside card)
    monitor =
    text =  $USER
    color = $text_color
    font_size = 17
    font_family = $font_symbols
    position = 0, 175
    halign = center
    valign = bottom
}

input-field {
    monitor =
    size = 260, 52
    rounding = 26
    outline_thickness = 2
    dots_size = 0.12
    dots_spacing = 0.3
    dots_center = true
    outer_color = $entry_border_color
    inner_color = $entry_background_color
    font_color = $entry_color
    placeholder_text = <i>Enter password</i>
    fade_on_empty = true
    fade_timeout = 1500
    position = 0, 130
    halign = center
    valign = bottom
}

label { # Caps Lock warning (right under input)
    monitor =
    text = cmd[update:250] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/check-capslock.sh
    color = $text_color
    font_size = 13
    font_family = $font_family
    position = 0, 65
    halign = center
    valign = bottom
}

# в”Ђв”Ђ Status (bottom-left, out of the way of the input card) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
label {
    monitor =
    text = cmd[update:5000] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/status.sh
    color = $muted_text_color
    font_size = 13
    font_family = $font_family
    position = 30, 30
    halign = left
    valign = bottom
}
