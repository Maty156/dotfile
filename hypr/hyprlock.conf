#  в”“в”Џв”“в”Џв”Џв”“в”ів”“в”“ в”Џв”“в”Џв”“в”“в”Џв”“
#  в”Јв”«в”—в”«в”ѓв”ѓв”Јв”«в”ѓ в”ѓв”ѓв”ѓ в”ѓв”« 
#  в”›в”—в”—в”›в”Јв”›в”›в”—в”—в”›в”—в”›в”—в”›в”›в”—в”›
#
# MASU hyprlock вЂ” clean left-side clock stack, pill input, no card box

# Sourcing matugen colors
source = $HOME/.config/hypr/hyprlock/matugen/matugen-hyprlock.conf

$text_color              = $on_surface
$muted_text_color        = $outline
$entry_background_color  = $surface_alpha
$entry_border_color      = $tertiary
$entry_color             = $on_surface
$accent                  = $primary

$font_family        = GeistMono Nerd Font
$font_family_clock  = Syne ExtraBold
$font_symbols       = GeistMono Nerd Font Propo

$image = $HOME/.local/share/bg

# в”Ђв”Ђ Background в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
background {
    monitor =
    path = $image
    blur_size = 6
    blur_passes = 3
    noise = 0.015
    contrast = 0.9
    brightness = 0.75
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# в”Ђв”Ђ Left-side clock stack (top-down: clock в†’ day в†’ date, no overlap) в”Ђв”Ђв”Ђв”Ђ
label { # Clock
    monitor =
    text = $TIME
    color = $text_color
    font_size = 84
    font_family = $font_family_clock
    position = 60, -60
    halign = left
    valign = top
}

label { # Day of week
    monitor =
    text = cmd[update:5000] date +"%A"
    color = $muted_text_color
    font_size = 20
    font_family = $font_family
    position = 65, -160
    halign = left
    valign = top
}

label { # Full date
    monitor =
    text = cmd[update:5000] date +"%B %d, %Y"
    color = $text_color
    font_size = 22
    font_family = $font_family
    position = 65, -195
    halign = left
    valign = top
}

# в”Ђв”Ђ Caps Lock warning в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
label {
    monitor =
    text = cmd[update:250] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/check-capslock.sh
    color = $text_color
    font_size = 13
    font_family = $font_family
    position = 0, 65
    halign = center
    valign = bottom
}

# в”Ђв”Ђ User (no card, just floating above the input) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
label {
    monitor =
    text =  $USER
    color = $text_color
    font_size = 17
    font_family = $font_symbols
    position = 0, 175
    halign = center
    valign = bottom
}

# в”Ђв”Ђ Pill-shaped input field, no background card behind it в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
input-field {
    monitor =
    size = 280, 52
    rounding = 26
    outline_thickness = 2
    dots_size = 0.12
    dots_spacing = 0.3
    dots_center = true
    outer_color = $entry_border_color
    inner_color = rgba(0, 0, 0, 0.45)
    font_color = $entry_color
    placeholder_text = <i>Enter password</i>
    fade_on_empty = true
    fade_timeout = 1500
    position = 0, 100
    halign = center
    valign = bottom
}

# в”Ђв”Ђ Status (bottom-left) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
label {
    monitor =
    text = cmd[update:5000] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/status.sh
    color = $muted_text_color
    font_size = 13
    font_family = $font_family
    position = 30, 30
    halign = left
    valign = bottom
}
